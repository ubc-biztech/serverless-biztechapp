resources:
  Resources:
    BiztechPartnersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: biztechPartners${self:provider.environment.ENVIRONMENT}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH

    BiztechPartnerEventLinksTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: biztechPartnerEventLinks${self:provider.environment.ENVIRONMENT}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: partnerId
            AttributeType: S
          - AttributeName: eventIdYear
            AttributeType: S
          - AttributeName: updatedAt
            AttributeType: N
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: partner-query
            KeySchema:
              - AttributeName: partnerId
                KeyType: HASH
              - AttributeName: updatedAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: event-query
            KeySchema:
              - AttributeName: eventIdYear
                KeyType: HASH
              - AttributeName: updatedAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    BiztechPartnershipEventsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: biztechPartnershipEvents${self:provider.environment.ENVIRONMENT}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH

    BiztechPartnerDocumentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: biztechPartnerDocuments${self:provider.environment.ENVIRONMENT}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: partnerId
            AttributeType: S
          - AttributeName: updatedAt
            AttributeType: N
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: partner-query
            KeySchema:
              - AttributeName: partnerId
                KeyType: HASH
              - AttributeName: updatedAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    BiztechPartnerCommunicationsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: biztechPartnerCommunications${self:provider.environment.ENVIRONMENT}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: partnerId
            AttributeType: S
          - AttributeName: updatedAt
            AttributeType: N
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: partner-query
            KeySchema:
              - AttributeName: partnerId
                KeyType: HASH
              - AttributeName: updatedAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    BiztechPartnershipsMetaTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: biztechPartnershipsMeta${self:provider.environment.ENVIRONMENT}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
