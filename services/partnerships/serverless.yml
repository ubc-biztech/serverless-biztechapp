service: biztechApi-partnerships
app: biztechapp

frameworkVersion: 3.40.0
useDotenv: true

plugins:
  - serverless-dynamodb
  - serverless-offline
  - serverless-domain-manager
  - serverless-esbuild
  - serverless-prune-plugin
  - serverless-mocha-plugin

provider:
  name: aws
  stage: ${file(../../serverless.common.yml):provider.stage}
  runtime: ${file(../../serverless.common.yml):provider.runtime}
  region: ${file(../../serverless.common.yml):provider.region}
  timeout: 20
  environment:
    ENVIRONMENT: ${file(../../config.${self:provider.stage}.json):ENVIRONMENT}
    NODE_ENV: ${env:NODE_ENV}
    PARTNERSHIPS_GSHEETS_ENABLED: ${env:PARTNERSHIPS_GSHEETS_ENABLED, ''}
    PARTNERSHIPS_GSHEETS_AUTO_SYNC: ${env:PARTNERSHIPS_GSHEETS_AUTO_SYNC, ''}
    PARTNERSHIPS_GSHEETS_SPREADSHEET_ID: ${env:PARTNERSHIPS_GSHEETS_SPREADSHEET_ID, ''}
    PARTNERSHIPS_GSHEETS_SHEET_NAME: ${env:PARTNERSHIPS_GSHEETS_SHEET_NAME, ''}
    PARTNERSHIPS_GSHEETS_SERVICE_ACCOUNT_JSON: ${env:PARTNERSHIPS_GSHEETS_SERVICE_ACCOUNT_JSON, ''}
    PARTNERSHIPS_GSHEETS_SERVICE_ACCOUNT_EMAIL: ${env:PARTNERSHIPS_GSHEETS_SERVICE_ACCOUNT_EMAIL, ''}
    PARTNERSHIPS_GSHEETS_PRIVATE_KEY: ${env:PARTNERSHIPS_GSHEETS_PRIVATE_KEY, ''}
    PARTNERSHIPS_EMAIL_SYNC_ENABLED: ${env:PARTNERSHIPS_EMAIL_SYNC_ENABLED, ''}
    PARTNERSHIPS_EMAIL_SYNC_INGEST_URL: ${env:PARTNERSHIPS_EMAIL_SYNC_INGEST_URL, ''}
    PARTNERSHIPS_EMAIL_SYNC_ALLOWED_DOMAINS: ${env:PARTNERSHIPS_EMAIL_SYNC_ALLOWED_DOMAINS, ''}
  apiGateway:
    restApiId: !ImportValue ${self:provider.stage}-ExtApiGatewayRestApiId
    restApiRootResourceId: !ImportValue ${self:provider.stage}-ExtApiGatewayRestApiRootResourceId

  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:Scan
        - dynamodb:Query
        - dynamodb:GetItem
        - dynamodb:PutItem
        - dynamodb:UpdateItem
        - dynamodb:DeleteItem
      Resource:
        - "arn:aws:dynamodb:us-west-2:432714361962:table/biztechPartners${self:provider.environment.ENVIRONMENT}"
        - "arn:aws:dynamodb:us-west-2:432714361962:table/biztechPartnerEventLinks${self:provider.environment.ENVIRONMENT}"
        - "arn:aws:dynamodb:us-west-2:432714361962:table/biztechPartnershipEvents${self:provider.environment.ENVIRONMENT}"
        - "arn:aws:dynamodb:us-west-2:432714361962:table/biztechPartnerDocuments${self:provider.environment.ENVIRONMENT}"
        - "arn:aws:dynamodb:us-west-2:432714361962:table/biztechPartnerCommunications${self:provider.environment.ENVIRONMENT}"
        - "arn:aws:dynamodb:us-west-2:432714361962:table/biztechPartnershipsMeta${self:provider.environment.ENVIRONMENT}"
        - "arn:aws:dynamodb:us-west-2:432714361962:table/biztechPartnerEventLinks${self:provider.environment.ENVIRONMENT}/index/partner-query"
        - "arn:aws:dynamodb:us-west-2:432714361962:table/biztechPartnerEventLinks${self:provider.environment.ENVIRONMENT}/index/event-query"
        - "arn:aws:dynamodb:us-west-2:432714361962:table/biztechPartnerDocuments${self:provider.environment.ENVIRONMENT}/index/partner-query"
        - "arn:aws:dynamodb:us-west-2:432714361962:table/biztechPartnerCommunications${self:provider.environment.ENVIRONMENT}/index/partner-query"
    - Effect: Allow
      Action:
        - dynamodb:Scan
        - dynamodb:GetItem
      Resource:
        - "arn:aws:dynamodb:us-west-2:432714361962:table/biztechEvents${self:provider.environment.ENVIRONMENT}"
    - Effect: Allow
      Action:
        - ses:SendEmail
      Resource:
        - "arn:aws:ses:us-west-2:432714361962:identity/*"

custom:
  prune:
    automatic: true
    number: 3
  bundle:
    sourcemaps: false
  serverless-offline:
    port: 4000
  serverless-mocha-plugin:
    testTemplate: ../../lib/testTemplate.ejs
  stage: ${opt:stage, self:provider.stage}
  domains:
    prod: api.ubcbiztech.com
    staging: api-staging.ubcbiztech.com
    dev: api-dev.ubcbiztech.com
  customDomain:
    domainName: ${self:custom.domains.${self:custom.stage}}
    basePath: ""
    stage: ${self:custom.stage}
    certificateName: ${self:custom.customDomain.domainName}
    createRoute53Record: true
    endpointType: edge
    apiType: rest
    autoDomain: false
  dynamodb:
    start:
      port: 8000
      migrate: true
      noStart: true
      convertEmptyValues: true
    stages:
      - dev

functions:
  partnershipsDashboard:
    handler: handler.getDashboard
    events:
      - http:
          path: partnerships/dashboard
          method: get
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId: ${cf:biztechApi-${file(../../serverless.common.yml):provider.stage}.CognitoAuthorizer}

  partnershipsListPartners:
