name: Deploy on merge
on:
  push:
    branches: [dev, master]
  repository_dispatch:
    types: [biztech_docs_updated]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: "20.7"

      # https://help.github.com/en/actions/configuring-and-managing-workflows/caching-dependencies-to-speed-up-workflows
      - name: Cache node modules
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          # npm cache files are stored in `~/.npm` on Linux/macOS
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Install Serverless CLI and dependencies
        run: |
          sudo npm i -g serverless@3 --legacy-peer-dep
          sls -v
          npm ci --legacy-peer-deps

      - name: "Deploy Dev"
        if: github.ref == 'refs/heads/dev' || (github.event_name == 'repository_dispatch' && github.event.action == 'biztech_docs_updated')
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DISCORD_APPLICATION_ID: ${{ secrets.DISCORD_APPLICATION_ID }}
          DISCORD_PUBLIC_KEY: ${{ secrets.DISCORD_PUBLIC_KEY }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GH_PRIVATE_KEY: ${{ secrets.GH_PRIVATE_KEY }}
          GH_PROJECT_ACCESS_KEY: ${{ secrets.GH_PROJECT_ACCESS_KEY }}
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          STRIPE_DEV_CANCEL: ${{ secrets.STRIPE_DEV_CANCEL }}
          STRIPE_DEV_ENDPOINT: ${{ secrets.STRIPE_DEV_ENDPOINT }}
          STRIPE_PROD_CANCEL: ${{ secrets.STRIPE_PROD_CANCEL }}
          STRIPE_PROD_ENDPOINT: ${{ secrets.STRIPE_PROD_ENDPOINT }}
          STRIPE_PROD_KEY: ${{ secrets.STRIPE_PROD_KEY}}
          STRIPE_DEV_KEY: ${{ secrets.STRIPE_DEV_KEY}}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_API_KEY: ${{ secrets.ALGOLIA_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          PARTNERSHIPS_GSHEETS_ENABLED: ${{ secrets.PARTNERSHIPS_GSHEETS_ENABLED }}
          PARTNERSHIPS_GSHEETS_AUTO_SYNC: ${{ secrets.PARTNERSHIPS_GSHEETS_AUTO_SYNC }}
          PARTNERSHIPS_GSHEETS_SPREADSHEET_ID: ${{ secrets.PARTNERSHIPS_GSHEETS_SPREADSHEET_ID }}
          PARTNERSHIPS_GSHEETS_SHEET_NAME: ${{ secrets.PARTNERSHIPS_GSHEETS_SHEET_NAME }}
          PARTNERSHIPS_GSHEETS_SERVICE_ACCOUNT_JSON: ${{ secrets.PARTNERSHIPS_GSHEETS_SERVICE_ACCOUNT_JSON }}
          PARTNERSHIPS_GSHEETS_SERVICE_ACCOUNT_EMAIL: ${{ secrets.PARTNERSHIPS_GSHEETS_SERVICE_ACCOUNT_EMAIL }}
          PARTNERSHIPS_GSHEETS_PRIVATE_KEY: ${{ secrets.PARTNERSHIPS_GSHEETS_PRIVATE_KEY }}
        run: |
          cd services
          for DIR in *; do
            cd "$DIR"
            sls deploy --conceal --stage dev
            cd ..
          done

      - name: "Deploy Prod"
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DISCORD_APPLICATION_ID: ${{ secrets.DISCORD_APPLICATION_ID }}
          DISCORD_PUBLIC_KEY: ${{ secrets.DISCORD_PUBLIC_KEY }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_PUBLIC_KEY_PROD: ${{ secrets.DISCORD_PUBLIC_KEY_PROD }}
          DISCORD_TOKEN_PROD: ${{ secrets.DISCORD_TOKEN_PROD }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GH_PRIVATE_KEY: ${{ secrets.GH_PRIVATE_KEY }}
          GH_PROJECT_ACCESS_KEY: ${{ secrets.GH_PROJECT_ACCESS_KEY }}
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          STRIPE_DEV_CANCEL: ${{ secrets.STRIPE_DEV_CANCEL }}
          STRIPE_DEV_ENDPOINT: ${{ secrets.STRIPE_DEV_ENDPOINT }}
          STRIPE_PROD_CANCEL: ${{ secrets.STRIPE_PROD_CANCEL }}
          STRIPE_PROD_ENDPOINT: ${{ secrets.STRIPE_PROD_ENDPOINT }}
          STRIPE_PROD_KEY: ${{ secrets.STRIPE_PROD_KEY}}
          STRIPE_DEV_KEY: ${{ secrets.STRIPE_DEV_KEY}}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_API_KEY: ${{ secrets.ALGOLIA_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          PARTNERSHIPS_GSHEETS_ENABLED: ${{ secrets.PARTNERSHIPS_GSHEETS_ENABLED }}
          PARTNERSHIPS_GSHEETS_AUTO_SYNC: ${{ secrets.PARTNERSHIPS_GSHEETS_AUTO_SYNC }}
          PARTNERSHIPS_GSHEETS_SPREADSHEET_ID: ${{ secrets.PARTNERSHIPS_GSHEETS_SPREADSHEET_ID }}
          PARTNERSHIPS_GSHEETS_SHEET_NAME: ${{ secrets.PARTNERSHIPS_GSHEETS_SHEET_NAME }}
          PARTNERSHIPS_GSHEETS_SERVICE_ACCOUNT_JSON: ${{ secrets.PARTNERSHIPS_GSHEETS_SERVICE_ACCOUNT_JSON }}
          PARTNERSHIPS_GSHEETS_SERVICE_ACCOUNT_EMAIL: ${{ secrets.PARTNERSHIPS_GSHEETS_SERVICE_ACCOUNT_EMAIL }}
          PARTNERSHIPS_GSHEETS_PRIVATE_KEY: ${{ secrets.PARTNERSHIPS_GSHEETS_PRIVATE_KEY }}
        run: |
          cd services
          for DIR in *; do
            cd "$DIR"
            sls deploy --conceal --stage prod
            cd ..
          done
